name: Build and Deploy Maths for AI

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile LaTeX documents
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: themes
          root_file: |
            main.tex
            ch1_pdf.tex
            ch2_pdf.tex
            ch3_pdf.tex
            ch4_pdf.tex
            ch5_pdf.tex
          # The action will compile each file listed in root_file

      - name: Prepare PDFs for MkDocs
        run: |
          mkdir -p docs/pdfs
          mv themes/main.pdf docs/pdfs/
          mv themes/ch1_pdf.pdf docs/pdfs/ch1_algebre.pdf
          mv themes/ch2_pdf.pdf docs/pdfs/ch2_optimisation.pdf
          mv themes/ch3_pdf.pdf docs/pdfs/ch3_probabilites.pdf
          mv themes/ch4_pdf.pdf docs/pdfs/ch4_calcul_diff.pdf
          mv themes/ch5_pdf.pdf docs/pdfs/ch5_geometrie.pdf

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Install MkDocs and Material Theme
        run: |
          pip install mkdocs-material

      - name: Deploy MkDocs to GitHub Pages
        run: mkdocs gh-deploy --force
